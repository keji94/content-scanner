# 中文小说上下文源声明

sources: []

context_mapping:
  static_fields: {}

  cumulative_fields:
    - name: key_facts
      type: list
      max_size: 50
      update_strategy: append
      confidence:
        track: true
        tentative_threshold: 0.7
        correction_strategy: override

    - name: character_states
      type: dict
      update_strategy: merge
      confidence:
        track: true
        tentative_threshold: 0.6
        correction_strategy: override

    - name: information_revealed
      type: list
      max_size: 30
      update_strategy: append
      confidence:
        track: true
        tentative_threshold: 0.7
        correction_strategy: override
