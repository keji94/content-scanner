# 电子书章节结构规则

- id: L001
  name: "信息密度过载"
  severity: warning
  weight: 5
  phase: 2
  check_prompt: |
    检查当前段落是否信息密度过高，导致读者消化困难。
    触发条件：单段内同时出现 3 个以上新概念/新术语/新角色，且没有给读者足够的消化空间。
    不触发：列举式内容（如工具列表、章节目录）、技术教程中的步骤列表。
  applies_to: [all]

- id: L002
  name: "读者视角断裂"
  severity: warning
  weight: 5
  phase: 2
  check_prompt: |
    检查当前段落的叙述视角是否突然切换。
    触发条件：前面用"你"（第二人称读者视角），突然切换到第三人称客观描述或反之；
    或者前面是口语化对话风格，突然变成教科书式的正式口吻。
    注意：引用块（>）和表格内的风格变化不算断裂。
  applies_to: [all]

- id: L003
  name: "过渡缺失"
  severity: suggestion
  weight: 2
  phase: 2
  check_prompt: |
    检查当前段落与上一段之间是否存在突兀的话题跳跃。
    触发条件：两段讨论完全不同的主题，中间没有任何过渡句或过渡词。
    不触发：小节标题（##）后的第一段、列表项之间、表格前后。
  applies_to: [all]

- id: L004
  name: "教学承诺未兑现"
  severity: critical
  weight: 10
  phase: 2
  check_prompt: |
    检查文本是否提出了承诺但没有兑现。
    触发条件：
    1. 说"我会教你X"但本章/本节没有实际教X
    2. 说"后面会讲"但全书目录中没有对应章节
    3. 提到"动手任务"但任务步骤不完整或不可执行
    4. 引用了前面未出现过的概念，读者无法理解
  applies_to: [all]

- id: L005
  name: "口语化断裂（教科书腔）"
  severity: warning
  weight: 3
  phase: 2
  check_prompt: |
    检查当前段落是否突然从口语风格变成教科书风格。
    教科书腔特征：大量使用被动语态、抽象名词、长定语、排比句式。
    触发条件：在口语化上下文中突然出现连续 2 句以上的教科书式表达。
    不触发：技术解释（如架构说明）本身就适合正式表达。
  applies_to: [all]

- id: L006
  name: "空洞承诺"
  severity: warning
  weight: 5
  phase: 2
  check_prompt: |
    检查文本中是否有听起来厉害但实际没有具体内容的承诺。
    触发条件："大幅提升""质变""颠覆""革命性"等大词后面没有跟具体数字、机制或案例。
    例外：章节导语/预告中的概括性描述不算空洞承诺。
  applies_to: [all]

- id: L007
  name: "案例前后不一致"
  severity: critical
  weight: 10
  phase: 2
  check_prompt: |
    检查贯穿案例在不同段落中的描述是否一致。
    触发条件：同一个案例在不同位置出现了矛盾的描述。
    例如：前面说"快递员发现包裹里有异能"，后面变成"快递员发现包裹里有超能力芯片"。
    需要结合累积上下文中的 key_facts 和 character_states 判断。
  applies_to: [all]

- id: L008
  name: "引用未定义的术语"
  severity: warning
  weight: 3
  phase: 2
  check_prompt: |
    检查当前段落是否使用了尚未解释的术语或概念。
    触发条件：出现了一个专业术语/系统概念，但：
    1. 前文没有定义过
    2. 当前段落也没有解释
    3. 没有标注"后面会解释"
    注意区分：通用词汇（读者都知道的）vs 专业术语（需要解释的）。
  applies_to: [all]

- id: L009
  name: "重复表达"
  severity: suggestion
  weight: 2
  phase: 2
  check_prompt: |
    检查当前段落是否与前面的段落重复表达了同一个意思。
    触发条件：同一观点在相近位置出现两次以上，且第二次没有增加新信息或新角度。
    不触发：刻意重复强调（如"再强调一遍"）、不同小节中从不同角度重新讨论同一主题。
  applies_to: [all]

- id: L010
  name: "行动指令不可执行"
  severity: critical
  weight: 10
  phase: 2
  check_prompt: |
    检查动手任务/练习中的行动指令是否足够具体可执行。
    触发条件：
    1. 要求读者做某事但没说怎么做（如"练习一下"但没有给具体步骤）
    2. 提到工具/网址但没给链接或获取方式
    3. 步骤有歧义，读者可能理解成不同操作
    不触发：探索性任务（"试试看会发生什么"本身就是任务目标）。
  applies_to: [all]
