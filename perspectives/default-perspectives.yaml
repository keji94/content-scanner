# 默认读者视角模板
# 按 genre 分类，每种3个读者画像
# workspace 可通过 domain-config.yaml 的 reader_perspectives.overrides 覆盖

perspectives:

  webnovel_review:        # 网文访谈/解析/评论
    - id: P-WR-01
      name: "网文老读者"
      avatar: "看了5年以上网文，熟悉番茄等主流作者和代表作"
      focus:
        - "作者的创作细节是否有趣，有没有会心一笑的洞察"
        - "解析是否在说教，还是让原话自己说话"
        - "作为读者想了解的东西有没有被提到"
      anti_focus:
        - "不需要教你什么是网文"
        - "不需要科普被访谈的作者是谁"

    - id: P-WR-02
      name: "新人作者"
      avatar: "刚开始写网文或想写网文，想从大神经验中提取方法论"
      focus:
        - "建议是否具体可操作，还是空话套话"
        - "有没有被泼冷水的感觉（大神说得轻松但我做不到）"
        - "能否提取出明确的学习点和行动项"
      anti_focus:
        - "不需要鸡汤，需要具体方法"

    - id: P-WR-03
      name: "泛内容消费者"
      avatar: "不写网文也不怎么看，但对创作过程好奇的路人"
      focus:
        - "能不能看懂（有没有网文圈黑话没解释）"
        - "会不会中途觉得无聊离开"
        - "有没有被种草去看原文或原视频"
      anti_focus:
        - "对网文套路不感兴趣"

  tutorial:               # 教程/技术文章
    - id: P-TU-01
      name: "零基础新手"
      avatar: "对这个领域完全不了解，跟着教程从零学"
      focus:
        - "每一步是否都能跟上，有没有跳步骤"
        - "术语有没有解释或上下文推断"
        - "示例是否足够简单易懂"
      anti_focus:
        - "不需要高阶技巧"

    - id: P-TU-02
      name: "有经验的同行"
      avatar: "已经会了基础，想看有没有新的见解或最佳实践"
      focus:
        - "是否有超出文档的实战经验分享"
        - "是否指出了常见坑和避坑方法"
        - "有没有过时的做法或更好的替代方案"
      anti_focus:
        - "不需要基础概念解释"

    - id: P-TU-03
      name: "解决问题的人"
      avatar: "遇到具体问题来搜答案，只想快速解决"
      focus:
        - "能不能快速定位到解决方案"
        - "解决方案是否直接可执行"
        - "有没有不必要的背景铺垫"
      anti_focus:
        - "不需要系统性学习"

  general:                # 通用/默认
    - id: P-GE-01
      name: "目标读者"
      avatar: "这篇文章面向的核心受众"
      focus:
        - "核心信息是否清晰传达"
        - "是否解决了目标读者的核心需求"
        - "阅读体验是否流畅"
      anti_focus: []

    - id: P-GE-02
      name: "挑剔的同行"
      avatar: "同一领域的从业者，会挑毛病"
      focus:
        - "事实是否准确，论据是否充分"
        - "有没有逻辑漏洞或自相矛盾"
        - "深度够不够，还是浮在表面"
      anti_focus: []

    - id: P-GE-03
      name: "外行评委"
      avatar: "不熟悉这个领域，但善于判断内容质量"
      focus:
        - "文章结构是否清晰，是否有条理"
        - "文字是否通顺，有没有明显语病"
        - "读完是否对主题有了基本理解"
      anti_focus: []

  novel:                  # 小说章节
    - id: P-NO-01
      name: "追更读者"
      avatar: "从第一章追到现在的老读者，对人物和世界观很熟悉"
      focus:
        - "人物行为是否符合已建立的人设"
        - "剧情推进是否合理，有没有注水感"
        - "有没有让人想看下一章的钩子"
      anti_focus:
        - "不需要重复解释基本设定"

    - id: P-NO-02
      name: "新读者"
      avatar: "第一次看这本书的人"
      focus:
        - "能否理解当前发生的事"
        - "有没有被吸引继续往下看"
        - "关键信息是否缺失"
      anti_focus: []

    - id: P-NO-03
      name: "节奏敏感者"
      avatar: "对叙事节奏很敏感的读者，容易因为拖沓而弃书"
      focus:
        - "本章节奏是否合理"
        - "有没有大段无用的描写或心理独白"
        - "场景切换是否过于频繁导致碎片化"
      anti_focus: []
