# 内容质量语义检查（文章类型）
# 对应 P0-05/14/15/16/23/24/22

- id: L001
  name: "标题缺乏情绪引导"
  severity: critical
  weight: 10
  phase: 2
  check_prompt: |
    检查文章标题是否具备情绪引导能力。
    触发条件：
    1. 标题是纯信息陈述，没有让读者产生好奇心或共鸣
    2. 标题承诺的内容与正文不符
    3. 标题使用了"我[动作]了[对象]"公式但文章并非亲身体验型
    不触发：标题包含数据钩子、反直觉断言、或痛点问题
  applies_to: [all]

- id: L002
  name: "编造场景或虚构经历"
  severity: critical
  weight: 10
  phase: 2
  check_prompt: |
    检查当前段落是否凭空编造场景、故事、对话或个人经历。
    触发条件：
    1. "我试了一下...结果发现..." 但无法追溯真实经历
    2. "想象一下这个场景..." 后面跟虚构的对话或情境
    3. "你一定遇到过这种情况..." 后面跟编造的场景
    不触发：引用真实案例（标注来源）、通用的场景描述（不涉及具体人物对话）
  applies_to: [all]

- id: L003
  name: "编造数据或伪造引用"
  severity: critical
  weight: 10
  phase: 2
  check_prompt: |
    检查当前段落是否包含无法追溯的数据或引用。
    触发条件：
    1. "据统计，XX% 的..." 但没有给出数据来源链接
    2. "XX 研究表明..." 但该研究可能不存在
    3. 具体数字（百分比、金额、数量）没有出处
    不触发：引用了可追溯的来源（带 URL 或明确的研究机构名称）、常识性数据
  applies_to: [all]

- id: L004
  name: "技术概念不准确"
  severity: critical
  weight: 10
  phase: 2
  check_prompt: |
    检查当前段落中的技术概念描述是否准确。
    触发条件：
    1. 技术术语定义与行业标准不符
    2. 算法或架构描述有明显错误
    3. 引用的工具/框架的功能描述与实际不符
    不触发：主观评价和观点、简化但方向正确的解释
  applies_to: [all]

- id: L005
  name: "连续纯观点无证据"
  severity: warning
  weight: 5
  phase: 2
  check_prompt: |
    检查当前段落是否连续输出观点而没有任何证据支撑。
    触发条件：连续200字以上纯观点、纯断言，没有数据、案例、引用、代码示例等任何具体证据。
    豁免区域：开头150字（钩子段落）和结尾100字（收尾段落）。
    不触发：段落中包含具体数字、案例、引用、或可追溯的事实
  applies_to: [all]

- id: L006
  name: "章节仅有转述无分析"
  severity: warning
  weight: 5
  phase: 2
  check_prompt: |
    检查当前章节（h2/h3 标题下的内容块）是否只有对来源材料的转述，缺少分析性内容。
    分析性内容包括：因果分析、对比分析、局限性分析、二阶效应。
    触发条件：整个章节只是"是什么"的描述，没有任何"为什么""跟什么比""什么边界"的分析。
    不触发：章节中包含作者的独立分析、对比、或评价
  applies_to: [all]

- id: L007
  name: "结构跟随单一素材"
  severity: warning
  weight: 5
  phase: 2
  check_prompt: |
    检查当前段落及前后文是否过度依赖单一素材。
    触发条件：段落叙述顺序与某一素材的原文高度平行，且内容占比超过25%。
    不触发：多素材综合的段落、作者原创的分析框架
  applies_to: [all]
